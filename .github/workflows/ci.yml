name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Clean install from the lockfile: fails loudly if package.json and
      # package-lock.json have drifted apart.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # --with-deps pulls the system libraries headless Chromium needs on the
      # GitHub runner image.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # playwright.config.ts builds the app and serves the production bundle
      # itself (webServer), so this covers the built artifact end to end.
      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
